services:
  postgres:
    image: postgres:16-alpine
    container_name: deploy-talent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: deploy_talent
      POSTGRES_USER: deploy_talent
      POSTGRES_PASSWORD: deploy_talent
    ports:
      - "5432:5432"
    volumes:
      - deploy_talent_pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: deploy-talent-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - deploy_talent_minio:/data

  minio-setup:
    image: minio/mc:latest
    container_name: deploy-talent-minio-setup
    depends_on:
      - minio
    volumes:
      - ./docker/minio-cors.xml:/config/cors.xml:ro
      - ./docker/setup-minio.sh:/setup-minio.sh:ro
    environment:
      MINIO_HOST: minio
      MINIO_PORT: "9000"
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    entrypoint: ["/bin/sh", "/setup-minio.sh"]
    restart: "no"

  mailpit:
    image: axllent/mailpit:latest
    container_name: deploy-talent-mailpit
    restart: unless-stopped
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"

volumes:
  deploy_talent_pgdata:
  deploy_talent_minio:
