services:
  postgres:
    image: postgres:16-alpine
    container_name: deploy-talent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: deploy_talent
      POSTGRES_USER: deploy_talent
      POSTGRES_PASSWORD: deploy_talent
    ports:
      - "5432:5432"
    volumes:
      - deploy_talent_pgdata:/var/lib/postgresql/data

  localstack:
    image: localstack/localstack:4.14.0
    restart: always
    ports:
      - "127.0.0.1:4566:4566"
    environment:
      SERVICES: s3,ses,lambda,iam,stsc,logs
      LOG_LEVEL: trace
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - "localstack_data:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./setup-localstack.sh:/etc/localstack/init/ready.d/provision.sh"
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  deploy_talent_pgdata:
  localstack_data:

