services:
  postgres:
    image: postgres:16-alpine
    container_name: deploy-talent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: deploy_talent
      POSTGRES_USER: deploy_talent
      POSTGRES_PASSWORD: deploy_talent
    ports:
      - "5432:5432"
    volumes:
      - deploy_talent_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deploy_talent -d deploy_talent"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: deploy-talent-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - deploy_talent_minio:/data
    healthcheck:
      test:
        ["CMD-SHELL", "mc alias set local http://localhost:9000 minioadmin minioadmin >/dev/null 2>&1 && mc ready local >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio-setup:
    image: minio/mc:latest
    container_name: deploy-talent-minio-setup
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./docker/minio-cors.xml:/config/cors.xml:ro
      - ./docker/setup-minio.sh:/setup-minio.sh:ro
    environment:
      MINIO_HOST: minio
      MINIO_PORT: "9000"
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    entrypoint: ["/bin/sh", "/setup-minio.sh"]

  mailpit:
    image: axllent/mailpit:latest
    container_name: deploy-talent-mailpit
    restart: unless-stopped
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"


  api:
    profiles: ["app"]
    build:
      context: ./api
    image: deploy-talent-api:local
    container_name: deploy-talent-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    environment:
      ENV_MODE: DEV
      PORT: "3000"
      DATABASE_URL: postgresql://deploy_talent:deploy_talent@postgres:5432/deploy_talent?schema=public
      JWT_SECRET: change-me
      JWT_EXPIRES_IN: 15m
      AWS_REGION: us-east-1
      S3_BUCKET: files
      S3_ENDPOINT: http://minio:9000
      S3_FORCE_PATH_STYLE: "true"
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      EMAIL_FROM: noreply@localhost
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_SECURE: "false"
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "3050:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health/ready >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  web:
    profiles: ["app"]
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:3050
    image: deploy-talent-web:local
    container_name: deploy-talent-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  deploy_talent_pgdata:
  deploy_talent_minio:
