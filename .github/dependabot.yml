version: 2
updates:
  - package-ecosystem: npm
    directory: /api
    schedule:
      interval: weekly
    groups:
      nestjs:
        patterns:
          - "@nestjs/*"
      prisma:
        patterns:
          - "@prisma/*"
          - "prisma"

  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
    groups:
      nextjs:
        patterns:
          - "next"
          - "react"
          - "react-dom"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
